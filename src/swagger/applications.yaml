openapi: 3.0.0
info:
  title: Job Application API
  version: 1.0.0

paths:
  /api/applications/apply:
    post:
      summary: Apply to a job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                jobId:
                  type: integer
                userId:
                  type: integer
      responses:
        201:
          description: Application created
        400:
          description: Already applied
