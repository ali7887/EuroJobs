name: CI

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Downgrade npm (stable)
        run: npm install -g npm@9

      - name: Install dependencies
        run: npm install

      - name: Type Check
        run: npm run type-check || true

      - name: Build
        run: npm run build
