<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- حلقه بیرونی - stroke فقط، بدون fill -->
  <circle cx="100" cy="100" r="90"
    fill="none"
    stroke="currentColor"
    stroke-width="6"/>

  <!-- ستاره سه‌پر - با currentColor -->
  <!-- پر بالا -->
  <polygon points="100,22  108,100  92,100"
    fill="currentColor"/>
  <!-- پر پایین-راست -->
  <polygon points="168,146  100,100  95,115"
    fill="currentColor"/>
  <!-- پر پایین-چپ -->
  <polygon points="32,146  100,100  105,115"
    fill="currentColor"/>

  <!-- دایره مرکزی -->
  <circle cx="100" cy="100" r="7"
    fill="currentColor"/>

  <!-- حلقه جداکننده داخلی -->
  <circle cx="100" cy="100" r="74"
    fill="none"
    stroke="currentColor"
    stroke-width="3"/>
</svg>
