<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- پس‌زمینه رادیال عمیق‌تر -->
    <radialGradient id="bgGrad" cx="38%" cy="32%" r="70%">
      <stop offset="0%" stop-color="#5a5a5a"/>
      <stop offset="40%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#050505"/>
    </radialGradient>

    <!-- گرادیان پرها - براق‌تر -->
    <linearGradient id="starGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="30%" stop-color="#f0f0f0"/>
      <stop offset="70%" stop-color="#d8d8d8"/>
      <stop offset="100%" stop-color="#a0a0a0"/>
    </linearGradient>

    <!-- گرادیان لبه پرها -->
    <linearGradient id="starEdge" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#cccccc" stop-opacity="0.6"/>
    </linearGradient>

    <!-- گرادیان حلقه بیرونی - چرخشی -->
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="20%"  stop-color="#e8e8e8"/>
      <stop offset="45%"  stop-color="#f8f8f8"/>
      <stop offset="70%"  stop-color="#b0b0b0"/>
      <stop offset="100%" stop-color="#d0d0d0"/>
    </linearGradient>

    <!-- گرادیان حلقه داخلی -->
    <linearGradient id="innerRingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#888888" stop-opacity="0.2"/>
    </linearGradient>

    <!-- گرادیان مرکز -->
    <radialGradient id="centerGrad" cx="30%" cy="25%" r="75%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="50%"  stop-color="#e8e8e8"/>
      <stop offset="100%" stop-color="#b8b8b8"/>
    </radialGradient>

    <!-- فیلتر glow قوی‌تر -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- فیلتر glow ملایم برای حلقه -->
    <filter id="ringGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- ماسک دایره -->
    <clipPath id="circleClip">
      <circle cx="60" cy="60" r="52"/>
    </clipPath>
  </defs>

  <!-- سایه بیرونی -->
  <circle cx="62" cy="63" r="54" fill="black" opacity="0.4"/>

  <!-- پس‌زمینه اصلی -->
  <circle cx="60" cy="60" r="54" fill="url(#bgGrad)"/>

  <!-- هایلایت بزرگ بالا-چپ -->
  <ellipse cx="42" cy="30" rx="26" ry="14"
    fill="white" opacity="0.08"
    transform="rotate(-35, 42, 30)"
    clip-path="url(#circleClip)"/>

  <!-- هایلایت کوچک‌تر مرکزی -->
  <ellipse cx="48" cy="38" rx="12" ry="7"
    fill="white" opacity="0.05"
    transform="rotate(-20, 48, 38)"
    clip-path="url(#circleClip)"/>

  <!-- پر شمال -->
  <path d="M60 60 L56.5 57 L60 8 L63.5 57 Z"
    fill="url(#starGrad)" filter="url(#glow)"/>

  <!-- پر جنوب‌شرق -->
  <path d="M60 60 L56.5 57 L60 8 L63.5 57 Z"
    fill="url(#starGrad)" filter="url(#glow)"
    transform="rotate(120, 60, 60)"/>

  <!-- پر جنوب‌غرب -->
  <path d="M60 60 L56.5 57 L60 8 L63.5 57 Z"
    fill="url(#starGrad)" filter="url(#glow)"
    transform="rotate(240, 60, 60)"/>

  <!-- دایره مرکزی -->
  <circle cx="60" cy="60" r="7" fill="url(#centerGrad)" filter="url(#glow)"/>

  <!-- هایلایت نقطه مرکزی -->
  <circle cx="57.5" cy="57.5" r="2" fill="white" opacity="0.7"/>

  <!-- حلقه داخلی ظریف -->
  <circle cx="60" cy="60" r="48" fill="none"
    stroke="url(#innerRingGrad)" stroke-width="0.8"/>

  <!-- حلقه بیرونی اصلی -->
  <circle cx="60" cy="60" r="56" fill="none"
    stroke="url(#ringGrad)" stroke-width="4.5"
    filter="url(#ringGlow)"/>

  <!-- هایلایت قوس بالا روی حلقه -->
  <path d="M 22 20 A 46 46 0 0 1 98 20"
    fill="none" stroke="white" stroke-width="2"
    opacity="0.6" stroke-linecap="round"/>

  <!-- هایلایت ثانویه ظریف‌تر -->
  <path d="M 28 16 A 40 40 0 0 1 92 16"
    fill="none" stroke="white" stroke-width="0.8"
    opacity="0.3" stroke-linecap="round"/>
</svg>
