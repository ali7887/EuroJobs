<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <clipPath id="bmw-inner">
      <circle cx="100" cy="100" r="64"/>
    </clipPath>
  </defs>

  <!-- حلقه بیرونی -->
  <circle cx="100" cy="100" r="90"
    fill="none"
    stroke="currentColor"
    stroke-width="6"/>

  <!-- ربع بالا-راست: پر -->
  <rect x="100" y="36" width="64" height="64"
    fill="currentColor"
    clip-path="url(#bmw-inner)"/>

  <!-- ربع پایین-چپ: پر -->
  <rect x="36" y="100" width="64" height="64"
    fill="currentColor"
    clip-path="url(#bmw-inner)"/>

  <!-- ربع بالا-چپ: خالی (transparent) -->
  <!-- ربع پایین-راست: خالی (transparent) -->

  <!-- خطوط تقسیم‌کننده -->
  <line x1="100" y1="36" x2="100" y2="164"
    stroke="currentColor"
    stroke-width="2.5"
    clip-path="url(#bmw-inner)"/>
  <line x1="36" y1="100" x2="164" y2="100"
    stroke="currentColor"
    stroke-width="2.5"
    clip-path="url(#bmw-inner)"/>

  <!-- حلقه جداکننده داخلی -->
  <circle cx="100" cy="100" r="64"
    fill="none"
    stroke="currentColor"
    stroke-width="4"/>
</svg>
